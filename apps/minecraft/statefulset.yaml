apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minecraft
spec:
  serviceName: minecraft
  replicas: 1
  selector:
    matchLabels:
      app: minecraft
  template:
    metadata:
      labels:
        app: minecraft
    spec:
      containers:
        - name: minecraft
          image: alraro/software-modpack-fauna:2.0.5
          tty: true
          stdin: true
          envFrom:
            - configMapRef:
                name: minecraft-config
            - secretRef:
                name: minecraft-rcon
                optional: true
          ports:
            - containerPort: 25565
              protocol: TCP
            - containerPort: 25575
              protocol: TCP
              name: rcon
          livenessProbe:
            exec:
              command:
                - mc-health
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - mc-health
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 2
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: "8Gi"
              cpu: "2000m"
            limits:
              memory: "16Gi"
              cpu: "3500m"
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 30Gi

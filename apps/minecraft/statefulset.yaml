apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minecraft
spec:
  serviceName: minecraft
  replicas: 1
  selector:
    matchLabels:
      app: minecraft
  template:
    metadata:
      labels:
        app: minecraft
    spec:
      initContainers:
        - name: restore
          image: itzg/mc-backup
          command:
            - sh
            - -c
            - |
              if [ -z "$(ls -A /data)" ]; then
                echo "Empty PVC, restoring latest backup..."
                restic restore latest --target /tmp/restore 2>/dev/null
                cp -a /tmp/restore/data/. /data/ 2>/dev/null || true
                rm -rf /tmp/restore
              fi
              echo "Restore check complete"
          env:
            - name: RESTIC_REPOSITORY
              value: "s3:https://axn9hj8nlpap.compat.objectstorage.eu-madrid-1.oraclecloud.com/server-minecraft-software-fauna-storage"
            - name: RESTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minecraft-backup
                  key: RESTIC_PASSWORD
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minecraft-backup
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minecraft-backup
                  key: AWS_SECRET_ACCESS_KEY
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: minecraft
          image: alraro/software-modpack-fauna:2.0.5
          tty: true
          stdin: true
          envFrom:
            - configMapRef:
                name: minecraft-config
            - secretRef:
                name: minecraft-rcon
                optional: true
          ports:
            - containerPort: 25565
              protocol: TCP
            - containerPort: 25575
              protocol: TCP
              name: rcon
          livenessProbe:
            exec:
              command:
                - mc-health
            initialDelaySeconds: 600
            periodSeconds: 60
            failureThreshold: 10
          readinessProbe:
            exec:
              command:
                - mc-health
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 5
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: "6Gi"
              cpu: "1000m"
            limits:
              memory: "16Gi"
              cpu: "3500m"
        - name: backup
          image: itzg/mc-backup
          env:
            - name: BACKUP_INTERVAL
              value: "24h"
            - name: BACKUP_METHOD
              value: "restic"
            - name: RESTIC_REPOSITORY
              value: "s3:https://axn9hj8nlpap.compat.objectstorage.eu-madrid-1.oraclecloud.com/server-minecraft-software-fauna-storage"
            - name: RESTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minecraft-backup
                  key: RESTIC_PASSWORD
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minecraft-backup
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minecraft-backup
                  key: AWS_SECRET_ACCESS_KEY
            - name: RCON_HOST
              value: localhost
            - name: RCON_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minecraft-rcon
                  key: RCON_PASSWORD
            - name: PRUNE_RESTIC_RETENTION
              value: "--keep-daily 7"
            - name: INITIAL_DELAY
              value: "5m"
            - name: TZ
              value: Europe/Madrid
          volumeMounts:
            - name: data
              mountPath: /data
              readOnly: true
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 30Gi

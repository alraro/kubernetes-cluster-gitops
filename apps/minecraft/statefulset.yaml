apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minecraft
spec:
  serviceName: minecraft
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: minecraft
  template:
    metadata:
      labels:
        app: minecraft
    spec:
      nodeSelector:
        kubernetes.io/hostname: software-minecraft-server-fauna
      tolerations:
        - operator: Exists
      volumes:
        - name: backup-storage
          hostPath:
            path: /minecraft-backups/server-software-fauna
            type: DirectoryOrCreate
      initContainers:
        - name: fix-backup-perms
          image: busybox
          command:
            - sh
            - -c
            - chown -R 1000:1000 /backups
          volumeMounts:
            - name: backup-storage
              mountPath: /backups
          securityContext:
            runAsUser: 0
        - name: restore
          image: itzg/mc-backup
          command:
            - sh
            - -c
            - |
              if [ ! -f /data/world/level.dat ]; then
                echo "No world found, checking for backups..."
                restic unlock 2>/dev/null || true
                restic snapshots --latest 1 2>/dev/null || restic init 2>/dev/null
                if restic snapshots --latest 1 2>/dev/null; then
                  echo "Restoring latest snapshot..."
                  restic restore latest --target /data
                else
                  echo "No snapshots available, server will generate new world"
                fi
              fi
              echo "Restore check complete"
          env:
            - name: RESTIC_REPOSITORY
              value: "/backups"
            - name: RESTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minecraft-backup
                  key: RESTIC_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /data
            - name: backup-storage
              mountPath: /backups
      containers:
        - name: minecraft
          image: alraro/software-modpack-fauna:2.1.2
          tty: true
          stdin: true
          envFrom:
            - configMapRef:
                name: minecraft-config
            - secretRef:
                name: minecraft-rcon
                optional: true
          ports:
            - containerPort: 25565
              protocol: TCP
            - containerPort: 25575
              protocol: TCP
              name: rcon
          livenessProbe:
            exec:
              command:
                - mc-health
            initialDelaySeconds: 600
            periodSeconds: 60
            failureThreshold: 10
          readinessProbe:
            exec:
              command:
                - mc-health
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 5
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: "6Gi"
              cpu: "1000m"
            limits:
              memory: "16Gi"
              cpu: "3500m"
        - name: backup
          image: itzg/mc-backup
          env:
            - name: BACKUP_INTERVAL
              value: "24h"
            - name: BACKUP_METHOD
              value: "restic"
            - name: RESTIC_REPOSITORY
              value: "/backups"
            - name: RESTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minecraft-backup
                  key: RESTIC_PASSWORD
            - name: RCON_HOST
              value: localhost
            - name: RCON_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minecraft-rcon
                  key: RCON_PASSWORD
            - name: PRUNE_RESTIC_RETENTION
              value: "--keep-daily 7"
            - name: INITIAL_DELAY
              value: "5m"
            - name: INCLUDES
              value: "world,config,defaultconfigs,datapacks,ops.json,whitelist.json,banned-players.json,banned-ips.json"
            - name: TZ
              value: Europe/Madrid
          volumeMounts:
            - name: data
              mountPath: /data
              readOnly: true
            - name: backup-storage
              mountPath: /backups
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 30Gi

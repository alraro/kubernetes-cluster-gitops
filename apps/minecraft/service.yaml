apiVersion: v1
kind: Service
metadata:
  name: minecraft
spec:
  type: LoadBalancer
  selector:
    app: minecraft
  ports:
    - port: 25565
      targetPort: 25565
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: minecraft-rcon
spec:
  type: ClusterIP
  selector:
    app: minecraft
  ports:
    - port: 25575
      targetPort: 25575
      protocol: TCP
      name: rcon

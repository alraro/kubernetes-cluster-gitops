apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: platform
  source:
    chart: traefik
    repoURL: https://traefik.github.io/charts
    targetRevision: 26.0.0
    helm:
      values: |
        deployment:
          kind: DaemonSet
        hostNetwork: true
        ports:
          web:
            port: 80
            expose: true
          websecure:
            port: 443
            expose: true
          minecraft:
            port: 25565
            expose: true
            exposedPort: 25565
            protocol: TCP
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
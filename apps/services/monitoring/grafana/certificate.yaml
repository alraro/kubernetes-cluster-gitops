apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grafana-tls-cert
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  secretName: grafana-tls-cert
  dnsNames:
    - grafana.alfonsoramos.dev
  issuerRef:
    name: letsencrypt-cloudflare
    kind: ClusterIssuer
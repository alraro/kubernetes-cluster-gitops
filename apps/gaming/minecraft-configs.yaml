apiVersion: v1
kind: ConfigMap
metadata:
  name: monitoring-configs
  namespace: default
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'minecraft'
        static_configs:
          - targets: ['localhost:25565'] # Si usas un exportador en el pod
  promtail-config.yml: |
    server:
      http_listen_port: 9080
    positions:
      filename: /tmp/positions.yaml
    clients:
      - url: http://loki:3100/loki/api/v1/push
    scrape_configs:
      - job_name: system
        static_configs:
          - targets: [localhost]
            labels:
              job: minecraft-logs
              __path__: /data/logs/*.log
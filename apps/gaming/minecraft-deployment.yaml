apiVersion: apps/v1
kind: Deployment
metadata:
  name: minecraft-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minecraft
  template:
    metadata:
      labels:
        app: minecraft
    spec:
      containers:
      - name: minecraft
        image: itzg/minecraft-server:java21
        env:
        - name: EULA
          value: "TRUE"
        - name: TYPE
          value: "NEOFORGE"
        - name: NEOFORGE_VERSION
          value: "21.1.211"
        - name: VERSION
          value: "1.21.1"
        - name: MEMORY
          value: "8G" # Ajusta según tu RAM en OCI
        - name: PACKWIZ_URL
          value: "https://raw.githubusercontent.com/alraro/Server-Minecraft-Software/refs/heads/develop/my-packwiz/pack.toml"
        - name: RCON_PASSWORD
          valueFrom:
            secretKeyRef:
              name: minecraft-secrets
              key: RCON_PASSWORD
        ports:
        - containerPort: 25565
          name: mc-port
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: minecraft-data

---

apiVersion: v1
kind: Service
metadata:
  name: minecraft-svc
spec:
  type: LoadBalancer # Esto expondrá tu servidor al mundo
  ports:
  - port: 25565
    targetPort: 25565
  selector:
    app: minecraft
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: all-infra
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/alraro/Oracle-cloud-services.git
    targetRevision: HEAD
    path: infra
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
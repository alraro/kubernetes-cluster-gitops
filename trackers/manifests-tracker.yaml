apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: manifests-tracker
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:alraro/Oracle-cloud-services.git
    path: manifests
    targetRevision: HEAD
    directory:
      recurse: true
      jsonnet: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      enabled: true
    syncOptions:
      - CreateNamespace=true
project: default
source:
  repoURL: git@github.com:alraro/Oracle-cloud-services.git
  path: apps/minecraft
  targetRevision: HEAD
  directory:
    recurse: true
    jsonnet: {}
destination:
  server: https://kubernetes.default.svc
  namespace: minecraft-server
syncPolicy:
  automated:
    prune: true
    selfHeal: true
    enabled: true
  syncOptions:
    - CreateNamespace=true
